<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Alternants — Espace RH</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<style>
:root{--bg:#fff;--bg2:#f8f7f5;--bg3:#f1efe8;--txt:#1a1a18;--txt2:#6b6b65;--bdr:rgba(0,0,0,.12);--bdr2:rgba(0,0,0,.22);--blue:#185FA5;--blue-l:#E6F1FB;--green:#3B6D11;--green-l:#EAF3DE;--amber:#854F0B;--amber-l:#FAEEDA;--red:#A32D2D;--red-l:#FCEBEB;--gray-l:#F1EFE8;--gray-t:#5F5E5A;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#28281f;--bg3:#111110;--txt:#f0ede8;--txt2:#9a9992;--bdr:rgba(255,255,255,.1);--bdr2:rgba(255,255,255,.2);--blue-l:#0C447C;--green-l:#27500A;--amber-l:#633806;--red-l:#791F1F;--gray-l:#2C2C2A;--gray-t:#B4B2A9}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px;color:var(--txt);background:var(--bg3);overflow:hidden}
.app{display:flex;height:100vh}
.sb{width:210px;flex-shrink:0;background:var(--bg);border-right:.5px solid var(--bdr);display:flex;flex-direction:column}
.sb-logo{padding:16px;border-bottom:.5px solid var(--bdr)}
.sb-logo h1{font-size:15px;font-weight:600}.sb-logo p{font-size:11px;color:var(--txt2);margin-top:2px}
.nav-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--txt2);padding:10px 16px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:13px;color:var(--txt2);border-left:2px solid transparent;transition:all .12s;white-space:nowrap}
.nav-item:hover{background:var(--bg2);color:var(--txt)}
.nav-item.active{background:var(--blue-l);color:var(--blue);border-left-color:var(--blue);font-weight:500}
.nav-item i{font-size:16px;flex-shrink:0}
.badge-cnt{margin-left:auto;background:var(--red-l);color:var(--red);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500}
.sb-foot{padding:12px 16px;border-top:.5px solid var(--bdr);font-size:11px;color:var(--txt2);margin-top:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg);border-bottom:.5px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:15px;font-weight:500}
.topbar-r{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.btn{padding:5px 11px;border:.5px solid var(--bdr2);background:var(--bg);color:var(--txt);border-radius:var(--r);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:background .1s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0C447C}
.btn-danger{background:var(--red-l);color:var(--red);border-color:transparent}
.metrics{display:grid;gap:10px;margin-bottom:14px}
.m4{grid-template-columns:repeat(4,1fr)}.m3{grid-template-columns:repeat(3,1fr)}.m5{grid-template-columns:repeat(5,1fr)}
.metric{background:var(--bg2);border-radius:var(--r);padding:12px 14px}
.metric-lbl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric-val{font-size:20px;font-weight:500}
.metric-sub{font-size:11px;color:var(--txt2);margin-top:2px}
.cblue{color:var(--blue)}.cgreen{color:var(--green)}.camber{color:var(--amber)}.cred{color:var(--red)}
.sec{background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rl);margin-bottom:14px;overflow:hidden}
.sec-head{padding:10px 14px;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sec-head h3{font-size:13px;font-weight:500}
.filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.filters select,.filters input{font-size:12px;padding:4px 8px;border:.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--txt);font-family:inherit}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 10px;text-align:left;font-weight:500;color:var(--txt2);border-bottom:.5px solid var(--bdr);font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0;background:var(--bg);z-index:1}
.tbl td{padding:8px 10px;border-bottom:.5px solid var(--bdr);vertical-align:middle}
.tbl tbody tr:hover td{background:var(--bg2)}
.tbl tfoot td{font-weight:500;background:var(--bg2);padding:8px 10px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.b-blue{background:var(--blue-l);color:var(--blue)}.b-green{background:var(--green-l);color:var(--green)}
.b-amber{background:var(--amber-l);color:var(--amber)}.b-red{background:var(--red-l);color:var(--red)}
.b-gray{background:var(--gray-l);color:var(--gray-t)}
/* FILIALES */
.fil-ce{background:linear-gradient(135deg,#275CF1,#0B1C48);color:#fff;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block}
.fil-gif{background:linear-gradient(135deg,#FFB199,#F43E40);color:#fff;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block}
.fil-foz{background:linear-gradient(135deg,#1B2340 30%,#EE7366);color:#fff;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block}
.fil-ico{background:linear-gradient(135deg,#EBEBE6,#E4DBD1);color:#555;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block}
.fil-tv{background:linear-gradient(135deg,#03516B,#E6F6FB);color:#fff;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block}
.fil-fin{background:linear-gradient(135deg,#5E81FF,#6704FF);color:#fff;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block}
.fil-other{background:var(--gray-l);color:var(--gray-t);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block}
.tabs{display:flex;border-bottom:.5px solid var(--bdr);padding:0 14px}
.tab{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-.5px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.prog-wrap{display:flex;align-items:center;gap:6px}
.prog{height:5px;background:var(--bdr);border-radius:99px;flex:1;overflow:hidden;min-width:50px}
.prog-bar{height:100%;border-radius:99px;background:var(--blue)}
.pb-green{background:#639922}.pb-red{background:#E24B4A}.pb-amber{background:#EF9F27}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.row-name{display:flex;align-items:center;gap:7px}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bdr);width:580px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-sm{width:420px}
.modal-head{padding:14px 18px;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:500}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:.5px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{padding:6px 9px;border:.5px solid var(--bdr2);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--txt);font-family:inherit}
.form-group textarea{resize:vertical;min-height:60px}
.sec-lbl{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 7px;padding-bottom:4px;border-bottom:.5px solid var(--bdr)}
/* FICHE */
.fiche-hdr{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.fiche-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.fiche-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fiche-card{background:var(--bg2);border-radius:var(--r);padding:12px}
.fiche-card h4{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:8px}
.drow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:.5px solid var(--bdr);font-size:12px}
.drow:last-child{border-bottom:none}
.drow span:first-child{color:var(--txt2)}.drow span:last-child{font-weight:500;text-align:right;max-width:60%}
.comment-box{background:var(--amber-l);border-left:3px solid #EF9F27;padding:8px 10px;border-radius:0 var(--r) var(--r) 0;font-size:12px;color:var(--amber);margin-bottom:14px}
/* SUIVI ALERTS */
.suivi-item{background:var(--bg2);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;border-left:3px solid transparent;transition:opacity .2s}
.suivi-item.done{opacity:.45}
.suivi-item.done .suivi-title{text-decoration:line-through}
.prio-haute{border-left-color:#E24B4A}
.prio-moyenne{border-left-color:#EF9F27}
.prio-basse{border-left-color:#378ADD}
.prio-badge-haute{background:var(--red-l);color:var(--red);padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.prio-badge-moyenne{background:var(--amber-l);color:var(--amber);padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.prio-badge-basse{background:var(--blue-l);color:var(--blue);padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.suivi-title{font-size:13px;font-weight:500;margin-bottom:3px}
.suivi-sub{font-size:11px;color:var(--txt2)}
.suivi-check{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mini-s{text-align:center;flex:1;background:var(--bg2);padding:9px 6px;border-radius:var(--r)}
.mini-v{font-size:18px;font-weight:500}.mini-l{font-size:10px;color:var(--txt2);margin-top:2px}
.page{display:none}.page.active{display:block}
@media(max-width:720px){.sb{width:50px}.sb-logo,.nav-lbl,.nav-item span,.sb-foot{display:none}.nav-item{justify-content:center;padding:10px}.m4,.m3,.m5{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.fg{grid-template-columns:1fr}}
.ov[contenteditable="true"]:hover{background:var(--blue-l);border-radius:3px}
.ov[contenteditable="true"]:focus{background:var(--blue-l);border-radius:3px;outline:1.5px solid var(--blue)!important}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rl);padding:36px 32px;width:360px;max-width:95vw;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.login-logo p{font-size:12px;color:var(--txt2)}
.login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.login-field label{font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px}
.login-field input{padding:9px 12px;border:.5px solid var(--bdr2);border-radius:var(--r);font-size:14px;background:var(--bg);color:var(--txt);font-family:inherit;transition:border-color .15s}
.login-field input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:6px;transition:background .15s}
.login-btn:hover{background:#0C447C}
.login-error{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:18px}
.login-fil-row{display:flex;justify-content:center;gap:6px;margin-bottom:24px;flex-wrap:wrap}

/* TAG FILTERS */
.tag-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center;position:relative}
.tag-group-label{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;margin-right:2px}
.ftag{padding:3px 9px;border:.5px solid var(--bdr2);border-radius:99px;font-size:11px;cursor:pointer;background:var(--bg);color:var(--txt2);transition:all .12s;white-space:nowrap;user-select:none}
.ftag:hover{border-color:var(--blue);color:var(--blue)}
.ftag.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.ftag.active-green{background:var(--green);color:#fff;border-color:var(--green)}
.ftag.active-amber{background:#EF9F27;color:#fff;border-color:#EF9F27}
.ftag.active-red{background:#E24B4A;color:#fff;border-color:#E24B4A}
.filter-divider{width:.5px;height:20px;background:var(--bdr2);margin:0 4px;flex-shrink:0}
.f-search-wrap{display:flex;align-items:center;gap:4px;margin-left:4px}
.f-search-wrap input{font-size:12px;padding:4px 9px;border:.5px solid var(--bdr2);border-radius:99px;background:var(--bg);color:var(--txt);font-family:inherit;width:140px}
.tag-clear{font-size:11px;color:var(--txt2);cursor:pointer;padding:2px 6px;border-radius:99px;white-space:nowrap}
.tag-clear:hover{color:var(--red)}

/* SEARCHABLE DROPDOWN */
.sd-wrap{position:relative;display:inline-block}
.sd-btn{padding:4px 10px;border:.5px solid var(--bdr2);border-radius:99px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--txt2);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:all .12s;user-select:none}
.sd-btn:hover{border-color:var(--blue);color:var(--blue)}
.sd-btn.has-active{background:var(--blue);color:#fff;border-color:var(--blue)}
.sd-btn .sd-count{background:rgba(255,255,255,.3);border-radius:99px;padding:0 5px;font-size:10px;font-weight:600}
.sd-dropdown{position:absolute;top:calc(100% + 5px);left:0;background:var(--bg);border:.5px solid var(--bdr2);border-radius:var(--rl);box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:500;min-width:200px;max-width:280px;overflow:hidden;display:none}
.sd-dropdown.open{display:block}
.sd-search{padding:8px 10px;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;gap:6px}
.sd-search i{color:var(--txt2);font-size:14px;flex-shrink:0}
.sd-search input{border:none;outline:none;font-size:12px;background:transparent;color:var(--txt);font-family:inherit;width:100%;min-width:0}
.sd-options{max-height:220px;overflow-y:auto;padding:4px 0}
.sd-option{padding:6px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--txt);transition:background .1s}
.sd-option:hover{background:var(--bg2)}
.sd-option.selected{color:var(--blue);font-weight:500}
.sd-option input[type=checkbox]{accent-color:var(--blue);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.sd-footer{padding:7px 10px;border-top:.5px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.sd-footer span{font-size:11px;color:var(--txt2)}
.sd-clear{font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.sd-clear:hover{text-decoration:underline}
.sd-empty{padding:14px 12px;font-size:12px;color:var(--txt2);text-align:center}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div style="display:flex;justify-content:center;gap:5px;margin-bottom:10px" class="login-fil-row">
        <span class="fil-ce" style="font-size:10px;padding:2px 7px">CE</span>
        <span class="fil-gif" style="font-size:10px;padding:2px 7px">GIF</span>
        <span class="fil-foz" style="font-size:10px;padding:2px 7px">FOZ</span>
        <span class="fil-ico" style="font-size:10px;padding:2px 7px">ICO</span>
        <span class="fil-tv" style="font-size:10px;padding:2px 7px">T&V</span>
        <span class="fil-fin" style="font-size:10px;padding:2px 7px">FIN</span>
      </div>
      <h1>Suivi Alternants</h1>
      <p>Espace RH — Accès restreint</p>
    </div>
    <div class="login-field">
      <label>Adresse email</label>
      <input type="email" id="login-email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter')document.getElementById('login-pwd').focus()">
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="login-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="app">
  <div class="sb">
    <div class="sb-logo"><h1>Alternants</h1><p>Espace RH</p></div>
    <div style="flex:1">
      <div class="nav-lbl">Navigation</div>
      <div class="nav-item active" onclick="showPage('dashboard',this)"><i class="ti ti-layout-dashboard"></i><span>Tableau de bord</span></div>
      <div class="nav-item" onclick="showPage('alternants',this)"><i class="ti ti-users"></i><span>Alternants</span></div>
      <div class="nav-item" onclick="showPage('finances',this)"><i class="ti ti-coin"></i><span>Finances</span></div>
      <div class="nav-item" onclick="showPage('suivi',this)"><i class="ti ti-checkbox"></i><span>Suivi &amp; alertes <span class="badge-cnt" id="alert-cnt">0</span></span></div>
      <div class="nav-item" onclick="showPage('outils',this)"><i class="ti ti-tool"></i><span>Outils RH</span></div>
      <div class="nav-item" onclick="showPage('data',this)"><i class="ti ti-chart-bar"></i><span>Data</span></div>
    </div>
    <div class="sb-foot">v2.1 · RH Alternants</div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="page-title">Tableau de bord</h2>
      <div class="topbar-r">
        <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Exporter</button>
        <button class="btn btn-primary" onclick="openModal('add')"><i class="ti ti-plus"></i> Ajouter</button>
      </div>
    </div>
    <div class="content">

      <!-- DASHBOARD -->
      <div id="page-dashboard" class="page active">
        <div class="metrics m5" id="dash-metrics"></div>
        <div class="g2">
          <div class="sec">
            <div class="sec-head"><h3>Répartition par filiale</h3></div>
            <div style="padding:14px" id="filiale-bars"></div>
          </div>
          <div class="sec">
            <div class="sec-head"><h3>Alertes suivi prioritaires</h3>
              <button class="btn" style="font-size:11px" onclick="showPage('suivi',document.querySelector('[onclick*=suivi]'))">Tout voir</button>
            </div>
            <div style="padding:10px 12px" id="dash-alerts"></div>
          </div>
        </div>
        <div class="sec">
          <div class="sec-head"><h3>Contrats à venir — Suivi CERFA &amp; convention</h3>
            <div style="font-size:11px;color:var(--txt2)" id="avenir-progress-lbl"></div>
          </div>
          <div style="overflow-x:auto;max-height:420px">
            <table class="tbl">
              <thead><tr><th>Alternant</th><th>Filiale</th><th>Ville</th><th>Poste</th><th>École</th><th>Promo</th><th>Tuteur</th><th>Début contrat</th><th style="text-align:center">CERFA signé</th><th style="text-align:center">Convention signée</th></tr></thead>
              <tbody id="avenir-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ALTERNANTS -->
      <div id="page-alternants" class="page">
        <div class="sec">
          <div class="sec-head">

const ALLOWED_EMAILS = [

const LOGIN_PASSWORD = 'AlternantRH2026!';

function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pwd = document.getElementById('login-pwd').value;
  const err = document.getElementById('login-error');

  if(!email){ err.textContent = 'Merci de saisir votre adresse email.'; return; }
  if(!pwd){ err.textContent = 'Merci de saisir le mot de passe.'; return; }

  const emailOk = ALLOWED_EMAILS.map(e=>e.toLowerCase()).includes(email);
  const pwdOk = pwd === LOGIN_PASSWORD;

  if(emailOk && pwdOk){
    document.getElementById('login-screen').style.display = 'none';
    err.textContent = '';
    // Shake animation reset
  } else if(!emailOk){
    err.textContent = "Cette adresse email n'est pas autorisée.";
    shakeLogin();
  } else {
    err.textContent = "Mot de passe incorrect.";
    shakeLogin();
    document.getElementById('login-pwd').value = '';
    document.getElementById('login-pwd').focus();
  }
}

function shakeLogin(){
  const card = document.querySelector('.login-card');
  card.style.transition = 'transform .08s';
  card.style.transform = 'translateX(8px)';
  setTimeout(()=>{ card.style.transform = 'translateX(-8px)'; },80);
  setTimeout(()=>{ card.style.transform = 'translateX(5px)'; },160);
  setTimeout(()=>{ card.style.transform = 'translateX(0)'; },240);
}

function fmt(n){if(n===null||n===undefined||isNaN(n)||n===0)return'—';return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n)+' €'}
function fmtNN(n){if(!n||isNaN(n))return'—';return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n)+' €'}
function pct(a,b){if(!b||b===0)return 0;return Math.round(a/b*100)}
function initials(a){return((a.prenom||'').charAt(0)+(a.nom||'').charAt(0)).toUpperCase()}
function filBadge(fil){const m={'CE':'fil-ce','GIF':'fil-gif','FOZ':'fil-foz','ICO':'fil-ico','T&V':'fil-tv','FIN':'fil-fin'};return`<span class="${m[fil]||'fil-other'}">${fil||'?'}</span>`}
function avBg(fil){const m={'CE':'#1A3A8A','GIF':'#C02020','FOZ':'#1B2340','ICO':'#999','T&V':'#03516B','FIN':'#6704FF'};return m[fil]||'#888'}
function avEl(a){return`<div class="av" style="background:${avBg(a.filiale)};color:#fff">${initials(a)}</div>`}
function presBadge(p){const m={'Présent':'b-green','À venir':'b-blue','Parti':'b-gray'};return`<span class="badge ${m[p]||'b-gray'}">${p||'—'}</span>`}
function statBadge(s){if(!s)return'<span class="badge b-gray">—</span>';if(s==='Accordé')return`<span class="badge b-blue">${s}</span>`;if(s==='En attente')return`<span class="badge b-amber">${s}</span>`;return`<span class="badge b-gray">${s}</span>`}

const SD_CONFIGS = {};

function sdBuild(id, label, options, isMulti=true, onchange=null){
  const dd = document.getElementById(id+'-dd');
  if(!dd) return;
  SD_CONFIGS[id] = {label, options, selected:[], isMulti, onchange};
  sdRender(id);
}

function sdRender(id){
  const cfg = SD_CONFIGS[id];
  const dd = document.getElementById(id+'-dd');
  const btn = document.querySelector(`#${id} .sd-btn`);
  if(!dd||!cfg) return;

  const sel = cfg.selected;
  const count = sel.length;
  if(btn){
    btn.classList.toggle('has-active', count > 0);
    const iconMatch = btn.innerHTML.match(/<i class="ti [^"]+"><\/i>/);
    const icon = iconMatch ? iconMatch[0] : '';
    btn.innerHTML = icon + ` ${cfg.label}${count>0?` <span class="sd-count">${count}</span>`:''} <i class="ti ti-chevron-down" style="font-size:11px"></i>`;
    btn.onclick = (e) => sdToggle(id, e);
  }

  dd.innerHTML = `
    <div class="sd-search"><i class="ti ti-search"></i><input type="text" placeholder="Rechercher..." oninput="sdFilter('${id}',this.value)" autocomplete="off"></div>
    <div class="sd-options" id="${id}-opts"></div>
    <div class="sd-footer"><span>${count} sélectionné(s)</span>${count>0?`<button class="sd-clear" onclick="sdClear('${id}')">Tout effacer</button>`:''}</div>`;
  sdFilter(id, '');
}

function sdFilter(id, query){
  const cfg = SD_CONFIGS[id];
  const container = document.getElementById(id+'-opts');
  if(!cfg||!container) return;
  const q = query.toLowerCase();
  const filtered = cfg.options.filter(o => o.toLowerCase().includes(q));
  if(!filtered.length){
    container.innerHTML = '<div class="sd-empty">Aucun résultat</div>';
    return;
  }
  container.innerHTML = filtered.map(o => {
    const isSel = cfg.selected.includes(o);
    return `<div class="sd-option ${isSel?'selected':''}" onclick="sdToggleOpt('${id}','${o.replace(/'/g,"\'")}')">
      <input type="checkbox" ${isSel?'checked':''} onclick="event.stopPropagation();sdToggleOpt('${id}','${o.replace(/'/g,"\'")}')">
      <span>${o}</span>
    </div>`;
  }).join('');
}

function sdToggleOpt(id, val){
  const cfg = SD_CONFIGS[id];
  if(!cfg) return;
  const idx = cfg.selected.indexOf(val);
  if(idx >= 0) cfg.selected.splice(idx, 1);
  else cfg.selected.push(val);
  sdRender(id);
  const query = document.querySelector(`#${id}-dd .sd-search input`);
  if(query) sdFilter(id, query.value);
  if(cfg.onchange) cfg.onchange();
}

function sdClear(id){
  const cfg = SD_CONFIGS[id];
  if(!cfg) return;
  cfg.selected = [];
  sdRender(id);
  if(cfg.onchange) cfg.onchange();
}

function sdToggle(id, e){
  if(e) e.stopPropagation();
  const dd = document.getElementById(id+'-dd');
  if(!dd) return;
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.sd-dropdown.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen) dd.classList.add('open');
}

document.addEventListener('click', ()=>{
  document.querySelectorAll('.sd-dropdown.open').forEach(d=>d.classList.remove('open'));
});

function sdGetSelected(id){
  return SD_CONFIGS[id] ? SD_CONFIGS[id].selected : [];
}

function populateFilters(){
  const villes = [...new Set(DB.map(a=>a.ville).filter(v=>v))].sort();
  const ecoles = [...new Set(DB.map(a=>a.ecole).filter(v=>v))].sort((a,b)=>a.localeCompare(b,'fr'));
  const postes = [...new Set(DB.map(a=>a.poste).filter(v=>v))].sort((a,b)=>a.localeCompare(b,'fr'));
  const filiales = ['CE','GIF','FOZ','ICO','T&V','FIN'];
  const presences = ['Présent','À venir','Parti'];
  const promos = ['2023','2024','2025','2026'];

  sdBuild('sd-presence', 'Présence', presences, true, filterAlt);
  sdBuild('sd-filiale', 'Filiale', filiales, true, filterAlt);
  sdBuild('sd-ville', 'Ville', villes, true, filterAlt);
  sdBuild('sd-promo', 'Promo', promos, true, filterAlt);
  sdBuild('sd-ecole', 'École', ecoles, true, filterAlt);
  sdBuild('sd-poste', 'Poste', postes, true, filterAlt);

  // Suivi filters
  const prioOpts = ['🔴 Haute|haute','🟡 Moyenne|moyenne','🔵 Basse|basse'];
  sdBuild('sd-suivi-prio', 'Priorité', ['haute','moyenne','basse'], true, renderSuivi);

  const altNames = [...new Set(DB.map(a=>`${a.prenom} ${a.nom}`))].sort((a,b)=>a.localeCompare(b,'fr'));
  sdBuild('sd-suivi-alt', 'Alternant', altNames, true, renderSuivi);

  // Suivi alt-sel (for creating alerts)
  const ss = document.getElementById('suivi-alt-sel');
  const sorted = [...DB].sort((a,b)=>(a.nom+a.prenom).localeCompare(b.nom+b.prenom,'fr'));
  sorted.forEach(a=>{
    const idx = DB.indexOf(a);
    const o = document.createElement('option');
    o.value = idx;
    o.textContent = `${a.prenom} ${a.nom} (${a.filiale} ${a.ville})`;
    ss.appendChild(o);
  });
}

// ===== SUIVI & ALERTES =====
function addSuivi(){
  const idx=parseInt(document.getElementById('suivi-alt-sel').value);
  const prio=document.getElementById('suivi-prio').value;
  const comment=document.getElementById('suivi-comment').value.trim();
  if(isNaN(idx)||idx<0||!comment){alert('Merci de choisir un alternant et d\'indiquer un commentaire.');return}
  const a=DB[idx];
  SUIVIS.push({
    id:Date.now(),
    altIdx:idx,
    altName:`${a.prenom} ${a.nom}`,
    filiale:a.filiale,
    ville:a.ville,
    prio,
    comment,
    date:new Date().toLocaleDateString('fr-FR'),
    done:false
  });
  document.getElementById('suivi-comment').value='';
  document.getElementById('suivi-alt-sel').value='';
  document.getElementById('suivi-prio').value='moyenne';
  renderSuivi();
  renderDashboard();
}

function toggleSuivi(id){
  const s=SUIVIS.find(s=>s.id===id);
  if(s) s.done=!s.done;
  renderSuivi();
  renderDashboard();
}

function deleteSuivi(id){
  SUIVIS=SUIVIS.filter(s=>s.id!==id);
  renderSuivi();
  renderDashboard();
}

function toggleArchive(){
  showArchive=!showArchive;
  document.getElementById('archive-btn-lbl').textContent=showArchive?'Masquer archivées':'Voir archivées';
  renderSuivi();
}

function renderSuivi(){
  const prioFilter = sdGetSelected('sd-suivi-prio');
  const altFilter = sdGetSelected('sd-suivi-alt');
  let items=SUIVIS.filter(s=>showArchive?true:!s.done);
  if(prioFilter.length) items=items.filter(s=>prioFilter.includes(s.prio));
  if(altFilter.length) items=items.filter(s=>altFilter.includes(s.altName));
  const prioOrder=['haute','moyenne','basse'];
  items.sort((a,b)=>(a.done?1:0)-(b.done?1:0)||prioOrder.indexOf(a.prio)-prioOrder.indexOf(b.prio));

  const active=SUIVIS.filter(s=>!s.done).length;
  document.getElementById('suivi-active-cnt').textContent=active;
  document.getElementById('alert-cnt').textContent=active;

  const prioBadge={'haute':'prio-badge-haute','moyenne':'prio-badge-moyenne','basse':'prio-badge-basse'};
  const prioLabel={'haute':'Haute','moyenne':'Moyenne','basse':'Basse'};

  if(!items.length){
    document.getElementById('suivi-list').innerHTML=`<div style="text-align:center;padding:30px;color:var(--txt2);font-size:13px">${showArchive?'Aucune alerte archivée':'Aucune alerte active — tout est à jour 🎉'}</div>`;
    return;
  }

  document.getElementById('suivi-list').innerHTML=items.map(s=>`
    <div class="suivi-item prio-${s.prio} ${s.done?'done':''}" id="suivi-${s.id}">
      <input type="checkbox" class="suivi-check" ${s.done?'checked':''} onchange="toggleSuivi(${s.id})" title="${s.done?'Rouvrir':'Marquer comme fait'}">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap">
          <span class="suivi-title">${s.altName}</span>
          ${filBadge(s.filiale)}
          <span class="${prioBadge[s.prio]}">${prioLabel[s.prio]}</span>
          ${s.done?'<span class="badge b-green" style="font-size:10px">✓ Fait</span>':''}
        </div>
        <div style="font-size:12px;color:var(--txt);margin-bottom:2px">${s.comment}</div>
        <div style="font-size:11px;color:var(--txt2)">${s.ville} · Créée le ${s.date}</div>
      </div>
      <button class="btn btn-danger" style="font-size:11px;padding:3px 8px;flex-shrink:0" onclick="deleteSuivi(${s.id})" title="Supprimer"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

    g('f-cerfa',a.cerfa);g('f-conv',a.conv);
    g('f-cout',a.cout_formation||'');g('f-pc',a.prise_en_charge||'');g('f-rac',a.reste_charge||'');

    ['f-nom','f-prenom','f-ville2','f-poste','f-debut','f-fin','f-duree','f-ecole2','f-tuteur','f-tuteur2','f-suite','f-cout','f-pc','f-rac','f-nego','f-reel','f-regle','f-nopco','f-sylae-p','f-sylae-r','f-comment'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});

function saveAlt(){

function exportCSV(){
  const cols=['nom','prenom','filiale','ville','poste','ecole','promo','presence','debut','fin','tuteur','statut_opco','cout_formation','prise_en_charge','reste_payer','sylae_prevu','sylae_percu','sylae_restant','commentaire'];
  const rows=DB.map(a=>cols.map(c=>{const v=a[c];return typeof v==='string'&&v.includes(';')?`"${v}"`:v||''}).join(';'));
  const csv=cols.join(';')+'\n'+rows.join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='alternants_export.csv';a.click();
  URL.revokeObjectURL(url);
}



// ===== OUTILS RH =====
let outilsEditMode = false;
let outilsData = {};

function toggleOutilsEdit(){
  outilsEditMode = !outilsEditMode;
  const btn = document.getElementById('outils-edit-btn');
  const hint = document.getElementById('outils-hint');
  const addRac = document.getElementById('btn-add-rac');

  if(outilsEditMode){
    btn.innerHTML = '<i class="ti ti-check"></i> Terminer';
    btn.style.background = '#3B6D11'; btn.style.borderColor = '#3B6D11';
    hint.textContent = 'Cliquez sur une valeur pour la modifier — Entrée pour valider';
    if(addRac) addRac.style.display = 'flex';
    document.querySelectorAll('.rac-del').forEach(b=>b.style.display='block');
    document.querySelectorAll('.ov').forEach(el=>{
      el.contentEditable = 'true';
      el.style.outline = '1.5px dashed var(--blue)';
      el.style.borderRadius = '3px';
      el.style.cursor = 'text';
      el.style.minWidth = '20px';
      el.style.display = el.style.display === 'none' ? 'inline' : el.style.display;
      el.addEventListener('blur', saveOutilVal);
      el.addEventListener('keydown', outilsKeydown);
    });
  } else {
    btn.innerHTML = '<i class="ti ti-edit"></i> Modifier';
    btn.style.background = ''; btn.style.borderColor = '';
    hint.textContent = 'Double-cliquez sur une valeur pour la modifier';
    if(addRac) addRac.style.display = 'none';
    document.querySelectorAll('.rac-del').forEach(b=>b.style.display='none');
    document.querySelectorAll('.ov').forEach(el=>{
      el.contentEditable = 'false';
      el.style.outline = '';
      el.style.cursor = '';
      el.removeEventListener('blur', saveOutilVal);
      el.removeEventListener('keydown', outilsKeydown);
    });
  }
}

function saveOutilVal(e){
  const key = e.target.dataset.key;
  if(key) outilsData[key] = e.target.innerText;
}

function outilsKeydown(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); e.target.blur(); }
  if(e.key === 'Escape'){ e.target.blur(); }
}

function addRacRow(){
  const list = document.getElementById('rac-list');
  const idx = list.querySelectorAll('.rac-row').length;
  const row = document.createElement('div');
  row.className = 'rac-row';
  row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--r)';
  row.innerHTML = `<span class="ov rac-ecole" data-key="rac${idx}_nom" style="font-weight:500;color:var(--txt);flex:1" contenteditable="true" style="outline:1.5px dashed var(--blue);border-radius:3px;cursor:text">Nouvelle école</span><span class="ov rac-montant" data-key="rac${idx}_mt" style="font-size:12px;font-weight:500;color:var(--txt)" contenteditable="true" style="outline:1.5px dashed var(--blue);border-radius:3px;cursor:text">0 € / contrat</span><button class="rac-del" onclick="delRacRow(this)" style="background:none;border:none;cursor:pointer;color:var(--red)"><i class="ti ti-trash"></i></button>`;
  list.appendChild(row);
  if(outilsEditMode){
    row.querySelectorAll('.ov').forEach(el=>{
      el.contentEditable='true';
      el.style.outline='1.5px dashed var(--blue)';
      el.style.cursor='text';
      el.addEventListener('blur', saveOutilVal);
      el.addEventListener('keydown', outilsKeydown);
    });
  }
  row.querySelector('.rac-ecole').focus();
}

function delRacRow(btn){ btn.closest('.rac-row').remove(); }

function renderDataPage(){

function drawIssue(){
  const promo = document.getElementById('data-promo-sel').value;
  let merged = {};
  if(promo === 'all'){
    Object.values(CHART_DATA.issue_by_promo).forEach(p=>{
      Object.entries(p).forEach(([k,v])=>{ merged[k]=(merged[k]||0)+v; });
    });
  } else {
    merged = CHART_DATA.issue_by_promo[promo] || {};
  }
  const labels = Object.keys(merged);
  const values = Object.values(merged);
  const colors = labels.map(l=>ISSUE_COLORS[l]||'#ccc');
  const total = values.reduce((a,b)=>a+b,0);

  destroyChart('chart-issue');
  const ctx = document.getElementById('chart-issue').getContext('2d');
  chartInstances['chart-issue'] = new Chart(ctx, {
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:isDark()?'#1e1e1c':'#fff'}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} (${Math.round(c.raw/total*100)}%)`}}},cutout:'60%',animation:{duration:600}}
  });

  document.getElementById('chart-issue-legend').innerHTML = labels.map((l,i)=>`
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:10px;height:10px;border-radius:50%;background:${colors[i]};flex-shrink:0"></div>

}
